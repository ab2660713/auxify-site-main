name: auxify-site-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: auxify-site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Site
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Secret scan
        run: ./gitleaks detect --source . --redact --verbose

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Deployment smoke and load checks
        run: |
          PORT=3000 HOSTNAME=0.0.0.0 pnpm start > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              break
            fi
            if ! kill -0 $SERVER_PID >/dev/null 2>&1; then
              cat server.log
              exit 1
            fi
            sleep 1
          done
          AUXIFY_SITE_BASE_URL=http://127.0.0.1:3000 pnpm verify:deployment
          AUXIFY_SITE_BASE_URL=http://127.0.0.1:3000 AUXIFY_LOAD_DURATION_MS=5000 AUXIFY_LOAD_CONCURRENCY=5 pnpm test:load:smoke

      - name: Format check
        run: pnpm format:check

      - name: Production dependency audit
        run: pnpm audit --prod

      - name: Docker build
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_URL=https://auxify.live \
            -t auxify-site:${{ github.sha }} .
